[project]
name = "iquant-market-data"
version = "0.1.0"
description = "iQuant 行情数据适配层：通达信 + 抽象接口"
requires-python = ">=3.12,<3.13"
dependencies = [
    "iquant-domain",
    "pydantic>=2.7.0",
    "structlog>=24.4.0",
    "anyio>=4.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/iquant_market_data"]
