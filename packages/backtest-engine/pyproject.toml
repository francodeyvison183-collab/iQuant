[project]
name = "iquant-backtest-engine"
version = "0.1.0"
description = "iQuant 回测引擎：DSL 求值薄层 + 第三方指标封装"
requires-python = ">=3.12,<3.13"
dependencies = [
    "iquant-domain",
    "empyrical-reloaded>=0.5.12",
    "pytz>=2024.1",
    "numpy>=2.0.0",
    "pandas>=2.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/iquant_backtest_engine"]
