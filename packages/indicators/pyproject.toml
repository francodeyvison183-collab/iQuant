[project]
name = "iquant-indicators"
version = "0.1.0"
description = "技术指标：封装 pandas-ta / TA-Lib"
requires-python = ">=3.12,<3.13"
dependencies = [
    "iquant-domain",
    "pandas>=2.2.0",
    "pandas-ta>=0.3.14b",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/iquant_indicators"]
