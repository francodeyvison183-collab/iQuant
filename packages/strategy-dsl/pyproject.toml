[project]
name = "iquant-strategy-dsl"
version = "0.1.0"
description = "策略 DSL 解析与校验（占位包，随产品迭代扩展）"
requires-python = ">=3.12,<3.13"
dependencies = [
    "iquant-domain",
    "pydantic>=2.7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/iquant_strategy_dsl"]
