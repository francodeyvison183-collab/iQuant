[alembic]
# 两套数据库共用同一份 alembic.ini，通过 -n 选择 section
script_location = storage/migrations
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
timezone = UTC
prepend_sys_path = .
version_path_separator = os
# 默认 section 跑业务主库（pg）；时序库通过 alembic -n timescale upgrade head 触发
sqlalchemy.url = postgresql+psycopg://iquant:iquant_dev_pwd@postgres:5432/iquant

[timescale]
script_location = storage/migrations
version_locations = storage/migrations/versions_ts
sqlalchemy.url = postgresql+psycopg://iquant:iquant_dev_pwd@timescaledb:5432/iquant_market

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
